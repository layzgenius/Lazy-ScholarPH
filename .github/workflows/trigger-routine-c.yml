name: Trigger Routine C (Instagram Promo Agent)

on:
  push:
    paths:
      - 'ai-pipeline/drafts/**.html'
    branches:
      - main

jobs:
  trigger-instagram-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify HTML draft exists
        id: check
        run: |
          count=$(find ai-pipeline/drafts -name "*.html" | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "status=ready" >> $GITHUB_OUTPUT
            echo "Found $count HTML draft(s). Triggering Instagram Promo Agent."
          else
            echo "status=not_ready" >> $GITHUB_OUTPUT
            echo "No HTML drafts found. Skipping trigger."
          fi

      - name: Trigger Routine C via API
        if: steps.check.outputs.status == 'ready'
        run: |
          curl -X POST "${{ secrets.ROUTINE_C_ENDPOINT }}" \
            -H "Authorization: Bearer ${{ secrets.ROUTINE_C_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"trigger": "github_action", "source": "routine-b-completion"}'
